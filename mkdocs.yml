site_name: ContextR Documentation
site_description: Context propagation for distributed .NET systems.
site_url: https://arttonoyan.github.io/ContextR/
repo_url: https://github.com/arttonoyan/ContextR
repo_name: arttonoyan/ContextR
edit_uri: edit/main/docs/

docs_dir: docs
site_dir: .build/docs-site
use_directory_urls: true
exclude_docs: README.md

theme:
  name: material
  icon:
    repo: fontawesome/brands/github
  palette:
    - scheme: slate
      primary: indigo
      accent: cyan
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
    - scheme: default
      primary: indigo
      accent: cyan
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - navigation.instant
    - navigation.tracking
    - content.code.copy
    - content.tabs.link
    - search.suggest
    - search.highlight

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      pygments_lang_class: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true

plugins:
  - search

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - https://unpkg.com/mermaid@10/dist/mermaid.min.js
  - javascripts/mermaid-init.js

nav:
  - Home: index.md
  - Introduction:
      - Overview: introduction/index.md
      - Why ContextR Was Born: WhyContextR.md
      - Getting Started: GettingStarted.md
      - When To Use ContextR: introduction/when-to-use.md
  - Core Concepts:
      - Overview: core-concepts/index.md
      - Context Lifecycle: core-concepts/context-lifecycle.md
      - Context Resolution: ContextR.Resolution.md
  - Architecture:
      - Overview: architecture/index.md
      - Internal Design: ARCHITECTURE.md
  - Propagation:
      - Overview: propagation/index.md
      - Mapping and Contracts: ContextR.Propagation.md
      - Inline JSON Strategy: ContextR.Propagation.InlineJson.md
      - Chunking Strategy: ContextR.Propagation.Chunking.md
      - Token Contracts: ContextR.Propagation.Token.md
  - Transports:
      - Overview: transports/index.md
      - ASP.NET Core Ingress: ContextR.AspNetCore.md
      - HTTP Client Egress: ContextR.Http.md
      - gRPC: ContextR.Grpc.md
      - HTTP Handler Scope Deep Dive: HttpClientHandlerScopes.md
  - Advanced:
      - Overview: advanced/index.md
      - Usage Cookbook: UsageCookbook.md
      - FAQ: FAQ.md
  - Samples:
      - Samples Overview: samples/index.md
      - Multi-tenant SaaS: samples/MultiTenantSaaS.md
      - Mixed HTTP + gRPC: samples/MicroservicesHttpGrpc.md
      - Background Jobs: samples/BackgroundJobs.md
      - Gateway Ingress Resolution: samples/GatewayIngressResolution.md
      - Replace IHttpContextAccessor: samples/HttpContextAccessorReplacement.md
      - JWT Adjunct Context: samples/JwtAdjunctContext.md
  - API Reference:
      - Overview: api-reference/index.md
      - Core Architecture: ARCHITECTURE.md
      - Resolution Package: ContextR.Resolution.md
      - Propagation Mapping Package: ContextR.Propagation.md
      - Inline JSON Package: ContextR.Propagation.InlineJson.md
      - Chunking Package: ContextR.Propagation.Chunking.md
      - Token Package: ContextR.Propagation.Token.md
      - ASP.NET Core Transport Package: ContextR.AspNetCore.md
      - HTTP Transport Package: ContextR.Http.md
      - gRPC Transport Package: ContextR.Grpc.md
