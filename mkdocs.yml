site_name: ContextR Documentation
site_description: Context propagation for distributed .NET systems.
site_url: https://arttonoyan.github.io/ContextR/
repo_url: https://github.com/arttonoyan/ContextR
repo_name: arttonoyan/ContextR
edit_uri: edit/main/docs/

docs_dir: docs
site_dir: .build/docs-site
use_directory_urls: true
exclude_docs: README.md

theme:
  name: material
  icon:
    repo: fontawesome/brands/github
  palette:
    - scheme: slate
      primary: indigo
      accent: cyan
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
    - scheme: default
      primary: indigo
      accent: cyan
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - navigation.instant
    - navigation.tracking
    - content.code.copy
    - content.tabs.link
    - search.suggest
    - search.highlight

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      pygments_lang_class: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true

plugins:
  - search

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - https://unpkg.com/mermaid@10/dist/mermaid.min.js
  - javascripts/mermaid-init.js

nav:
  - Home: index.md
  - Getting Started:
      - Overview: getting-started/index.md
      - Quickstart: GettingStarted.md
      - Why ContextR: WhyContextR.md
  - Concepts:
      - Overview: concepts/index.md
      - Context Lifecycle: core-concepts/context-lifecycle.md
      - Architecture: ARCHITECTURE.md
      - Resolution Model: ContextR.Resolution.md
  - Integration:
      - Overview: integration/index.md
      - ASP.NET Core Ingress: ContextR.AspNetCore.md
      - HTTP Client Egress: ContextR.Http.md
      - gRPC: ContextR.Grpc.md
      - Async and Background Work: UsageCookbook.md
      - HTTP Handler Scopes: HttpClientHandlerScopes.md
  - Packages:
      - Overview: packages/index.md
      - Core: packages/core.md
      - Resolution: packages/resolution.md
      - Propagation Base: packages/propagation.md
      - Propagation Mapping: packages/propagation-mapping.md
      - Propagation Inline JSON: packages/propagation-inline-json.md
      - Propagation Chunking: packages/propagation-chunking.md
      - Propagation Token: packages/propagation-token.md
      - Hosting ASP.NET Core: packages/hosting-aspnet-core.md
      - Transport HTTP: packages/transport-http.md
      - Transport gRPC: packages/transport-grpc.md
      - Package Details:
          - Resolution Details: ContextR.Resolution.md
          - Propagation Base Details: ContextR.Propagation.md
          - Inline JSON Details: ContextR.Propagation.InlineJson.md
          - Chunking Details: ContextR.Propagation.Chunking.md
          - Token Details: ContextR.Propagation.Token.md
  - Samples:
      - Samples Overview: samples/index.md
      - Multi-tenant SaaS: samples/MultiTenantSaaS.md
      - Mixed HTTP + gRPC: samples/MicroservicesHttpGrpc.md
      - Background Jobs: samples/BackgroundJobs.md
      - Gateway Ingress Resolution: samples/GatewayIngressResolution.md
      - Replace IHttpContextAccessor: samples/HttpContextAccessorReplacement.md
      - JWT Adjunct Context: samples/JwtAdjunctContext.md
