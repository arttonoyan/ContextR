name: ci

on:
  pull_request:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore ContextR.slnx

      - name: Build
        run: dotnet build ContextR.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test ContextR.slnx --configuration Release --no-build /p:CollectCoverage=true /p:CoverletOutputFormat=cobertura

      - name: Install ReportGenerator
        shell: bash
        run: |
          dotnet tool install --global dotnet-reportgenerator-globaltool
          echo "$HOME/.dotnet/tools" >> "$GITHUB_PATH"

      - name: Generate coverage report
        run: |
          reportgenerator \
            -reports:"./tests/**/TestResults/Coverage/coverage.cobertura.xml" \
            -targetdir:"./.coverage/report" \
            -reporttypes:"HtmlInline_AzurePipelines;Cobertura;MarkdownSummaryGithub"

      - name: Add coverage summary to job
        shell: bash
        run: |
          if [ -f "./.coverage/report/SummaryGithub.md" ]; then
            cat "./.coverage/report/SummaryGithub.md" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Coverage summary not found." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Post coverage to PR
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          path: ./.coverage/report/SummaryGithub.md

      - name: Upload to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./.coverage/report/Cobertura.xml
          fail_ci_if_error: false

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: ./.coverage/report
          if-no-files-found: error

      - name: Upload raw test results artifact
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: ./tests/**/TestResults
          if-no-files-found: error
