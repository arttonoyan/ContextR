name: ci

on:
  pull_request:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore ContextR.slnx

      - name: Build
        run: dotnet build ContextR.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test ContextR.slnx --configuration Release --no-build --collect:"XPlat Code Coverage" --results-directory ./.coverage/testresults

      - name: Install ReportGenerator
        shell: bash
        run: |
          dotnet tool install --global dotnet-reportgenerator-globaltool
          echo "$HOME/.dotnet/tools" >> "$GITHUB_PATH"

      - name: Generate coverage report
        run: |
          reportgenerator \
            -reports:"./.coverage/testresults/**/coverage.cobertura.xml" \
            -targetdir:"./.coverage/report" \
            -reporttypes:"HtmlInline_AzurePipelines;Cobertura;MarkdownSummaryGithub"

      - name: Add coverage summary to job
        shell: bash
        run: |
          if [ -f "./.coverage/report/SummaryGithub.md" ]; then
            cat "./.coverage/report/SummaryGithub.md" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Coverage summary not found." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: ./.coverage/report
          if-no-files-found: error

      - name: Upload raw test results artifact
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: ./.coverage/testresults
          if-no-files-found: error
