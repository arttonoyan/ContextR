name: ci

on:
  pull_request:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore ContextR.slnx

      - name: Build
        run: dotnet build ContextR.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test ContextR.slnx --configuration Release --no-build
